<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library System</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <header>
    <h1>📚 Library Management System</h1>
  </header>

  <main>
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search by title or author..." />
      </div>
      <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="Programming">Programming</option>
        <option value="Science">Science</option>
        <option value="History">History</option>
      </select>
      <span id="bookCount" class="book-count"></span>
    </div>

    <div class="add-book-toggle">
      <button id="toggleForm">➕ Add New Book</button>
    </div>

    <div class="add-book" id="addBookForm" style="display:none;">
      <h2>Add New Book</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="title">Title *</label>
          <input id="title" placeholder="Book title">
        </div>
        <div class="form-group">
          <label for="author">Author *</label>
          <input id="author" placeholder="Author name">
        </div>
        <div class="form-group">
          <label for="category">Category *</label>
          <input id="category" placeholder="e.g. Science">
        </div>
        <div class="form-group">
          <label for="authorBirthYear">Author Birth Year</label>
          <input id="authorBirthYear" placeholder="e.g. 1950">
        </div>
        <div class="form-group">
          <label for="publishDate">Publish Date</label>
          <input id="publishDate" placeholder="e.g. 2005">
        </div>
        <div class="form-group">
          <label for="authorNationality">Author Nationality</label>
          <input id="authorNationality" placeholder="e.g. British">
        </div>
        <div class="form-group">
          <label for="rating">Rating (0-5)</label>
          <input id="rating" type="number" min="0" max="5" step="0.1" placeholder="e.g. 4.5">
        </div>
        <div class="form-group">
          <label for="location">Location Code <span class="ref-only">(Ref only)</span></label>
          <input id="location" placeholder="e.g. A1">
        </div>
        <div class="form-group checkbox-group">
          <label><input type="checkbox" id="isReference"> Reference Book</label>
        </div>
      </div>
      <button id="addBook">Add Book</button>
    </div>

    <div id="booksContainer" class="books-container"></div>
  </main>

  <script src="public/app.js"></script>
</body>
</html>
